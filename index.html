<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stonecutter Practice</title>
<style>
body{font-family:"Century Gothic";background:#f5f7fb;padding:20px}
.card{background:#fff;padding:20px;margin:15px 0;border-radius:15px;border:2px solid #ddd}
button{padding:10px;border-radius:10px;border:none;cursor:pointer}
.correct{background:#d4edda}
.wrong{background:#f8d7da}
</style>
</head>
<body>

<div class="card">
<h2>Word Practice</h2>
<p>Unscramble the words</p>

<div>1. satisfied<br><input class="word" data-answer="satisfied" placeholder="s _ t _ s _ i _ d"></div>
<div>2. mightier<br><input class="word" data-answer="mightier" placeholder="m _ _ h _ i _ r"></div>
<div>3. broken<br><input class="word" data-answer="broken" placeholder="b _ o _ e _"></div>
<div>4. destroy<br><input class="word" data-answer="destroy" placeholder="d _ s _ r _ y"></div>
<div>5. furniture<br><input class="word" data-answer="furniture" placeholder="f _ r _ i _ u _ e"></div>
<div>6. palace<br><input class="word" data-answer="palace" placeholder="p _ l _ c _"></div>
<div>7. carriage<br><input class="word" data-answer="carriage" placeholder="c _ r _ i _ g _"></div>
<div>8. furniture<br><input class="word" data-answer="furniture" placeholder="f _ r _ i _ u _ e"></div>

<br>
<button onclick="checkWords()">Check</button>
<button onclick="hint()">Clue</button>
<button onclick="resetWords()">Reset</button>
<p id="wordResult"></p>
<p id="hintBox"></p>
</div>

<div class="card">
<h2>Comprehension</h2>

<div>1. What was his job?<br>
<button onclick="check(this,'b')">A prince</button>
<button onclick="check(this,'b')">Stonecutter</button>
<button onclick="check(this,'b')">Cloud</button>
</div>

<div>2. Why sun?<br>
<button onclick="check(this,'c')">cool</button>
<button onclick="check(this,'c')">big house</button>
<button onclick="check(this,'c')">stronger</button>
</div>

<div>3. What stopped wind?<br>
<button onclick="check(this,'a')">mountain</button>
<button onclick="check(this,'a')">cloud</button>
<button onclick="check(this,'a')">house</button>
</div>

<div>4. Lesson?<br>
<button onclick="check(this,'b')">power happy</button>
<button onclick="check(this,'b')">comparing bad</button>
<button onclick="check(this,'b')">rich best</button>
</div>

</div>

<script>
function checkWords(){
let words=document.querySelectorAll('.word');
let score=0;
words.forEach(w=>{
if(w.value.toLowerCase()==w.dataset.answer){w.style.background='#d4edda';score++}
else w.style.background='#f8d7da';
});
document.getElementById('wordResult').innerText=score+"/8";
}

function hint(){
let words=document.querySelectorAll('.word');
for(let w of words){
if(w.value==''){
document.getElementById('hintBox').innerHTML="Starts with: "+w.dataset.answer[0];
break;
}
}
}

function resetWords(){
document.querySelectorAll('.word').forEach(w=>{w.value='';w.style.background='white'});
document.getElementById('wordResult').innerText='';
document.getElementById('hintBox').innerText='';
}

function check(btn,ans){
if(btn.innerText.toLowerCase().includes(ans))btn.style.background='#d4edda';
else btn.style.background='#f8d7da';
}
</script>

</body>
</html>
